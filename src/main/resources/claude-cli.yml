# Claude Code CLI 전용 설정.
# application.yml의 spring.config.import 로 합쳐짐.
# llm.provider=claude-cli 일 때만 실제로 사용됨.
#
# 구독(Pro/Max) 한도 안에서 호출 — API 토큰 비용 0.
# subprocess 오버헤드(수 초)가 있어 ollama처럼 1회 호출 모드로 동작.
# 이미지: 임시 PNG 저장 → 프롬프트에 절대경로 포함 → Claude Code가 Read tool로 자동 로드.
#
# 사전 준비:
#   1) `npm install -g @anthropic-ai/claude-code` 로 CLI 설치
#   2) `claude` 한 번 실행해서 로그인 (Pro/Max 구독 계정)
#   3) `claude --version` 으로 PATH 확인
reaction-bot:
  claude-cli:
    # 자동 탐색 실패 시 fallback 실행파일.
    # 자동 탐색(executable-search-dir) 성공하면 이 값은 사용되지 않음.
    # 환경변수로 덮어쓰기 가능: CLAUDE_CLI_EXEC
    executable: ${CLAUDE_CLI_EXEC:claude}

    # 버전 폴더 자동 탐색 디렉토리. 빈 값이면 OS별 기본값 사용.
    #  Windows 기본: %APPDATA%\Claude\claude-code  (네이티브 인스톨러 위치)
    # 이 안의 하위 폴더(예: "2.1.149", "2.1.150")들 중 가장 높은 SemVer 폴더의
    # claude.exe(또는 claude)를 실행파일로 사용. 인스톨러가 새 버전 폴더 만들면 봇 재시작 시 자동 추종.
    # npm 글로벌 설치 같은 환경이면 이걸 빈 값으로 두고 executable 에 직접 박을 것.
    executable-search-dir: ""

    # CLI를 실행할 작업 디렉토리. Claude Code가 cwd 기준으로 .claude/settings.json,
    # CLAUDE.md를 읽으므로 봇 프로젝트 컨텍스트가 섞이는 게 싫으면 빈 디렉토리 지정.
    # 빈 값이면 봇 프로세스 cwd 그대로 사용.
    working-dir: ""

    # 모델 지정. 빈 값이면 CLI 기본값(보통 Sonnet).
    # 리액션 봇은 짧은 응답이면 충분하니 Haiku 권장.
    #   claude-haiku-4-5-20251001  ← 가장 빠르고 한도 적게 먹음
    #   claude-sonnet-4-6          ← 더 풍부한 반응
    model: "claude-haiku-4-5-20251001"

    # CLI 응답 최대 대기 시간(초). 콜드 스타트 + 추론 포함.
    # 첫 호출은 느릴 수 있어 여유 둠.
    timeout-sec: 30

    # 임시 스크린샷 저장 디렉토리. 빈 값이면 OS 임시 디렉토리(java.io.tmpdir).
    # 호출 종료(성공/실패 무관) 시 항상 삭제.
    temp-image-dir: ""

    # true면 프롬프트를 stdin으로 전달, false면 -p 인자로.
    # 히스토리·이미지경로가 합쳐지면 길어지므로 stdin이 안전(ARG_MAX 회피).
    use-stdin-prompt: true

    # CLI에 허용할 도구. 빈 값이면 미지정(CLI 기본).
    # 리액션 봇은 이미지 읽기만 필요 → Read 만 허용해서 다른 도구 실행 차단.
    allowed-tools: "Read"

    # 적극성 nudge 자동 주입 여부. ollama와 동일 컨셉.
    assertive: false

    # PASS/SPEAK 1차 판단을 별도 CLI 호출로 수행할지.
    # true 시 매 발화에 triage CLI 호출 추가 → subprocess 콜드스타트 2번 (~+2-4초).
    # 트레이드오프:
    #  + 명백한 PASS 케이스에서 스크린샷 저장/Read tool/큰 모델 추론 건너뜀
    #  + llm.multimodal-mode=ai-decide와 조합 시 SPEAK_TEXT일 때 캡처 자체 생략
    #  - 매 호출마다 latency 추가
    # 권장: 호명-전용 모드(speech.respond-only-when-addressed=true)처럼
    #       PASS 빈도가 높은 사용 패턴에서만 ON.
    triage-enabled: true

    # triage용 모델. 빈 값이면 main model과 동일. Haiku가 빨라서 추천.
    triage-model: "claude-haiku-4-5"

    # triage CLI 호출 타임아웃(초). 본 호출보다 짧게.
    triage-timeout-sec: 15

    # claude-cli 전용 추가 시스템 지침. character.yml의 system-prompt 뒤에 append.
    # 한국어 강제·이모지 금지·줄 수 제한·라벨 prefix 금지 등 출력 정제 룰.
    extra-system-prompt: |
      [Claude Code CLI 출력 규칙 - 엄격]
      - 출력은 발화 본문 한 줄만. 도구 호출/설명/마크다운 없이 순수 텍스트로.
        라벨([답변], [반응], "답변:", "Bot:" 등)·따옴표·코드블록 절대 금지.
      - 길이: 1~2문장. 부연 설명 금지.
      - 한국어로만. 영문은 게임 내 고유명사만 허용.
      - 이모지/이모티콘/특수기호 금지(음성 합성 대상).
      - 첨부된 이미지 경로가 프롬프트에 있으면 Read 도구로 한 번만 확인 후 바로 응답.
        파일 시스템 탐색·추가 분석 금지.
