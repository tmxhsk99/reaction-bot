# Codex CLI (OpenAI) 전용 설정.
# application.yml의 spring.config.import 로 합쳐짐.
# llm.provider=codex-cli 일 때만 실제로 사용됨.
#
# 동작: subprocess로 `codex exec` 호출. ollama/claude-cli처럼 1회 호출 모드.
# 이미지: 임시 PNG 저장 → `-i <경로>`로 직접 첨부 (Claude Code와 달리 Read 도구 불필요).
# 최종 응답: `-o <임시파일>`로 캡처 후 sanitize.
#
# 인증 (둘 중 하나):
#   A) 구독형 (토큰 비용 0): 사전에 `codex login` 으로 ChatGPT Plus/Pro 계정 로그인.
#      → api-key 를 빈 값으로 두면 저장된 로그인을 재사용.
#   B) 종량형 (API 토큰 과금): api-key 에 값 지정 (또는 CODEX_API_KEY 환경변수).
#
# 사전 준비:
#   1) `npm install -g @openai/codex` (또는 brew) 로 CLI 설치
#   2) 구독형이면 `codex login` 한 번 실행
#   3) `codex --version` 으로 PATH 확인
#
# !! 중요 (Claude Code와의 차이) !!
# codex 에는 기본 시스템 프롬프트를 통째로 교체하는 --system-prompt 플래그가 없음.
# codex 의 "코딩 에이전트" 기본 프롬프트가 항상 깔려 있어서, 캐릭터 페르소나는
# 프롬프트 본문 앞에 강하게 주입하는 방식으로 동작함. RP가 약해지면 extra-system-prompt 로 보강.
reaction-bot:
  codex-cli:
    # 자동 탐색 안 함. PATH에 있으면 "codex", 없으면 절대경로. 환경변수 CODEX_CLI_EXEC로 덮어쓰기 가능.
    executable: ${CODEX_CLI_EXEC:codex}

    # API 키. 값이 있으면 CODEX_API_KEY로 전달돼 종량 과금. 빈 값이면 구독 로그인 사용.
    api-key: ${CODEX_API_KEY:}

    # 생성 모델. 빈 값이면 codex 설정 기본값.
    #   gpt-5-codex  ← 코덱스 기본 계열
    #   o4-mini      ← 더 빠르고 저렴
    model: ""

    # triage용 모델. 빈 값이면 main model과 동일.
    triage-model: ""

    # 추론 강도. minimal | low | medium | high. 실시간 봇은 속도 중요 → low 권장.
    # 빈 값이면 미지정(codex 기본). -c model_reasoning_effort=<값> 로 전달.
    reasoning-effort: "low"

    # codex exec 작업 디렉토리(--cd). 빈 값이면 봇 cwd.
    # codex가 AGENTS.md를 읽으므로, 봇/프로젝트 컨텍스트 섞임이 싫으면 빈 디렉토리 지정.
    working-dir: ""

    # git 저장소 밖에서도 실행 허용(--skip-git-repo-check). 빈 작업 디렉토리 쓸 때 true 필요.
    skip-git-repo-check: true

    # ~/.codex/config.toml 로드 건너뛰기(--ignore-user-config). 인증은 그대로 사용.
    ignore-user-config: false

    # 한 번 호출 최대 대기(초). 콜드 스타트 + 추론 포함. codex는 첫 호출이 느릴 수 있어 여유.
    timeout-sec: 40

    # 임시 스크린샷 저장 디렉토리. 빈 값이면 OS 임시 디렉토리. 호출 끝나면 항상 삭제.
    temp-image-dir: ""

    # true면 ollama처럼 적극성 nudge 자동 주입.
    assertive: false

    # PASS/SPEAK 1차 판단을 별도 codex 호출로 수행할지.
    # true 시 매 발화에 triage 호출 추가 → subprocess 콜드스타트 2번. PASS 빈도 높은 패턴에서만 ON.
    triage-enabled: true

    # triage CLI 호출 타임아웃(초). 본 호출보다 짧게.
    triage-timeout-sec: 20

    # codex 전용 추가 시스템 지침. 페르소나 블록 뒤에 append. 출력 정제 룰.
    extra-system-prompt: |
      [Codex CLI 출력 규칙 - 엄격]
      - 너는 코딩 어시스턴트가 아니다. 위 페르소나의 캐릭터로만 행동하라. 코드/파일 작업 절대 하지 마라.
      - 출력은 발화 본문 한 줄만. 도구 호출/설명/마크다운 없이 순수 텍스트로.
        라벨([답변], "답변:", "Bot:" 등)·따옴표·코드블록 절대 금지.
      - 길이: 1~2문장. 부연 설명 금지.
      - 한국어로만. 영문은 게임 내 고유명사만 허용.
      - 이모지/이모티콘/특수기호 금지(음성 합성 대상).
