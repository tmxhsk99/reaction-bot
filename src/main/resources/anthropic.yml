# Claude (Anthropic) 전용 설정.
# application.yml의 spring.config.import 로 합쳐짐.
# llm.provider=anthropic 일 때만 실제로 사용됨.
#
# 2단계 모델로 비용 절감:
#  - triage-model: 매 발화마다 "지금 말할 만한가?" 1차 판단 (Haiku, 저렴)
#  - model      : SPEAK 판정 났을 때 실제 코멘트 생성 (Sonnet, 고품질)
reaction-bot:
  anthropic:
    api-key: ${ANTHROPIC_API_KEY:}
    model: claude-haiku-4-5              # 코멘트 생성용
    triage-model: claude-haiku-4-5       # PASS 판단용 (cheap, 약 1/3 가격)
    max-tokens: 200
