server:
  port: 8080

reaction-bot:
  # 캐릭터 이름 / 스트리머 이름 (환경변수로 덮어쓰기 가능)
  # BOT_NAME, STREAMER_NAME 환경변수 설정 시 그 값을 우선 사용
  character:
    name: ${BOT_NAME:리봇}
    streamer-name: ${STREAMER_NAME:로크만}

  # Claude API
  # 2단계 모델로 비용 절감:
  #  - triage-model: 매 발화마다 "지금 말할 만한가?" 1차 판단 (Haiku, 저렴)
  #  - model      : SPEAK 판정 났을 때 실제 코멘트 생성 (Sonnet, 고품질)
  anthropic:
    api-key: ${ANTHROPIC_API_KEY}
    model: claude-sonnet-4-6              # 코멘트 생성용
    triage-model: claude-haiku-4-5        # PASS 판단용 (cheap, 약 1/3 가격)
    max-tokens: 200

  # 대화 히스토리
  history:
    max-turns: 10                   # 최근 N턴 (user+assistant 각각)

  # TTS
  # provider:
  #   "azure" - Azure Speech REST API. 한국어 음성 다양, 무료 tier 월 50K자. AZURE_SPEECH_KEY 필요.
  #            가용 음성:
  #              여: JiMin(차분), SunHi(밝음), YuJin(발랄), SeoHyeon, SoonBok
  #              남: InJoon, BongJin(중후), GookMin(친근), Hyunsu, HyunsuMultilingual
  #   "edge"  - Microsoft Edge 무료 TTS. 키 불필요. 한국어는 현재 3개만 살아있음.
  #            가용 음성: ko-KR-SunHiNeural(여), ko-KR-InJoonNeural(남), ko-KR-HyunsuMultilingualNeural(남)
  tts:
    provider: "edge"                 # "azure" 또는 "edge"
    python-executable: "python"
    voice: "ko-KR-SunHiNeural"        # provider에 맞는 음성으로 지정
    rate: "+10%"
    pitch: "+5Hz"
    output-dir: "tts-output"
    cleanup-on-startup: true              # 서버 기동 시 tts-output/tts-*.mp3 잔재 일괄 삭제 (강제 종료된 경우 청소)
    cleanup-on-shutdown: true             # 서버 종료 시 tts-output/tts-*.mp3 일괄 삭제
    azure:
      key: ${AZURE_SPEECH_KEY:}       # provider=azure일 때만 필요. 환경변수로 주입
      region: ${AZURE_SPEECH_REGION:koreacentral}

  # STT 워커 (마이크 -> Whisper -> 서버 POST)
  # 서버 기동 시 자식 프로세스로 같이 띄움
  stt:
    auto-start: true                # false면 안 띄움 (개발 중 마이크 끄고 싶을 때)
    python-executable: "python"
    script-path: "scripts/stt_worker.py"
    model: "small"                  # tiny, base, small, medium, large-v3 (medium↑ 한국어 정확도 큰폭 ↑)
    language: "ko"
    compute-type: "int8"            # int8(CPU 빠름), float16(GPU), float32(정확)
    device: "cpu"                   # cpu, cuda, auto. cuda는 NVIDIA cuBLAS 설치 필요
    vad-aggressiveness: 2           # 0(관대) ~ 3(엄격). BGM 섞이면 3
    device-index:                   # 빈 값이면 기본 마이크
    server-url: "http://localhost:8080"
    beam-size: 5                    # 빔 서치 크기. 1=속도 우선, 5=권장(정확도↑), 10=느림
    # pokemon-ko-en.json 의 포켓몬 이름은 SttWorkerRunner 가 자동으로 initial_prompt 에 주입.
    # 여기엔 도메인 특화 추가 힌트만 적으면 됨 (방송용어/사람이름/자주 쓰는 문장 등). 빈 값이면 자동 주입만 사용.
    initial-prompt: ""

  # 화면 캡처 (발화마다 같이 전송)
  screen:
    source: "obs"                   # "obs" = OBS WebSocket으로 송출 화면, "robot" = 모니터 전체
    monitor-index: 0                # source=robot일 때만. 0 = 주모니터
    obs:
      host: "localhost"
      port: 4455                    # OBS WebSocket 기본 포트
      password: ${OBS_PASSWORD:}    # OBS에 비밀번호 설정한 경우만. 환경변수 OBS_PASSWORD로 주입
      source-name: ""               # 빈 값이면 현재 프로그램 씬을 자동으로 캡처. 특정 소스/씬 이름 지정 가능
      timeout-ms: 3000

  # 발화 트리거 처리
  speech:
    # 봇 발화 중일 때 들어온 발화는 무시
    ignore-during-speech: true
    # 봇 발화 끝나고 N ms 동안 추가로 무시 (스피커 잔향/피드백 컷)
    grace-period-ms: 800
    # 너무 짧은 발화는 무시 (헛기침, "어", "음" 등)
    min-text-length: 2
    # 발화 사이 쿨다운 (봇이 한 번 말한 뒤 ms 동안 prefilter가 더 엄격)
    cooldown-ms: 8000
    # 연속 N번 PASS 후 다음 호출에 "이번엔 반드시 응답" 힌트 자동 주입 (적극성 안전망)
    # 0 이면 비활성. 권장: 2~3
    nudge-after-pass-count: 3
    # 정규식 prefilter — 이 패턴 매칭하면 Claude 호출 자체를 안 함 (토큰 절약)
    # Java Pattern 문법. 발화 전체 문자열 대상.
    filler-patterns:
      - "^[음어아에오와예네응]+[\\s.?!~ㅋㅎ]*$"          # 단일 추임새
      - "^[ㅋㅎ\\s]{1,10}$"                              # ㅋㅋ, ㅎㅎ 류
      - "^(잠깐만?|어어+|음음+|아아+)[\\s.?!]*$"          # 잠깐만, 어어어 등

  # 능동 발문 - 정적 시간이 길면 봇이 가끔 먼저 말 걸기
  idle-trigger:
    enabled: true
    silence-threshold-ms: 60000    # 유저가 1분 이상 조용하면
    min-since-bot-ms: 60000        # 봇이 마지막으로 말한지 1분 이상 지났어야
    check-interval-ms: 20000        # 스케줄러 20초마다 체크

  # 포켓몬 컨텍스트 - 발화에 포켓몬 이름 감지되면 PokeAPI에서 정보 받아와서 LLM에 주입
  pokemon:
    enabled: true
    pokeapi-base: "https://pokeapi.co/api/v2"
    cache-ttl-sec: 86400

logging:
  level:
    com.jhkim.reactionbot: DEBUG
