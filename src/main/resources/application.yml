server:
  port: 8080

spring:
  # LLM provider별 디테일은 각 파일로 분리. provider 스위치(llm.provider)는 application.yml에 유지.
  config:
    import:
      - classpath:anthropic.yml
      - classpath:gemini.yml
      - classpath:openai.yml
      - classpath:ollama.yml
      - classpath:claude-cli.yml
      - classpath:codex-cli.yml
      # /config UI가 저장하는 사용자 설정. cwd 기준 ./config.yml.
      # optional: 파일이 없어도 기동 실패 안 함.
      # spring.config.import 는 가장 마지막에 import 된 소스가 우선 → application.yml/classpath 값보다
      # config.yml 이 우선 덮어쓴다. 외부 옵션(--spring.config.additional-location) 불필요.
      - optional:file:./config.yml

reaction-bot:
  # 캐릭터 이름 / 스트리머 이름 (환경변수로 덮어쓰기 가능)
  # BOT_NAME, STREAMER_NAME 환경변수 설정 시 그 값을 우선 사용
  # use-custom-prompt=true 면 아래 custom-* 3종으로 character.yml 본문을 대체. /config UI에서 편집 권장.
  character:
    name: ${BOT_NAME:리봇}
    streamer-name: ${STREAMER_NAME:로크만}
    use-custom-prompt: false
    custom-identity: ""
    custom-personality: ""
    custom-rules: ""

  # LLM provider 선택 — 각 provider별 디테일은 anthropic.yml / gemini.yml / openai.yml / ollama.yml / claude-cli.yml / codex-cli.yml 참조.
  # "anthropic"  = Claude API (Haiku triage + Sonnet 생성). 토큰 단가 결제.
  # "gemini"     = Gemini API (Flash-Lite triage + Flash 생성, 더 저렴).
  # "openai"     = OpenAI API (mini triage + 생성). 토큰 단가 결제. OPENAI_API_KEY 필요.
  # "ollama"     = 로컬 Ollama 단일 모델 (1회 호출. vision은 ollama.vision으로 토글).
  # "claude-cli" = Claude Code CLI subprocess. Pro/Max 구독 한도 내 호출 → 토큰 비용 0.
  #                임시 PNG로 스크린샷 저장 → CLI에 경로 전달 → stdout 응답 캡처. 사전 `claude` 로그인 필요.
  # "codex-cli"  = Codex CLI(OpenAI) subprocess. `codex login`(구독, 토큰 0) 또는 CODEX_API_KEY(종량).
  #                임시 PNG를 -i로 첨부 → -o로 최종 응답 캡처. 사전 `codex` 설치/로그인 필요.
  llm:
    provider: claude-cli
    # 비전(화면 캡처) 사용 정책. triage를 지원하는 provider(anthropic/gemini)에서만 의미 있음.
    #   "always"    : 매 호출마다 캡처 (기본, 기존 동작 유지). 화면 의존 봇이면 안전한 선택.
    #   "never"     : 캡처 안 함 (텍스트 전용).
    #   "ai-decide" : triage 단계에서 LLM이 vision 필요 여부 판단 (SPEAK_VISION / SPEAK_TEXT).
    #                 화면 의존 발화만 캡처 → 텍스트 잡담·호명 응답에선 캡처 비용/지연 절감.
    # single-call provider(ollama)는 이 설정 무시. claude-cli는 triage-enabled=true일 때만 따름.
    multimodal-mode: ai-decide

  # 대화 히스토리
  history:
    max-turns: 4                    # 최근 N턴 (user+assistant 각각). 로컬 Ollama VL은 KV-cache 부담 → 짧게 유지

  # TTS — Microsoft Edge 무료 TTS만 지원. 키 불필요.
  # 가용 한국어 음성: ko-KR-SunHiNeural(여), ko-KR-InJoonNeural(남), ko-KR-HyunsuMultilingualNeural(남)
  tts:
    provider: "edge"
    python-executable: "python"
    voice: "ko-KR-SunHiNeural"
    rate: "+10%"
    pitch: "+5Hz"
    output-dir: "tts-output"
    cleanup-on-startup: true              # 서버 기동 시 tts-output/tts-*.mp3 잔재 일괄 삭제 (강제 종료된 경우 청소)
    cleanup-on-shutdown: true             # 서버 종료 시 tts-output/tts-*.mp3 일괄 삭제

  # STT 워커 (마이크 -> Whisper -> 서버 POST)
  # 서버 기동 시 자식 프로세스로 같이 띄움
  stt:
    auto-start: true                # false면 안 띄움 (개발 중 마이크 끄고 싶을 때)
    python-executable: "python"
    script-path: "scripts/stt_worker.py"
    model: "small"                  # tiny, base, small, medium, large-v3 (medium↑ 한국어 정확도 큰폭 ↑)
    language: "ko"
    compute-type: "int8"            # int8(CPU 빠름), float16(GPU), float32(정확)
    device: "cpu"                   # cpu, cuda, auto. cuda는 NVIDIA cuBLAS 설치 필요
    vad-aggressiveness: 3           # 0(관대) ~ 3(엄격). 버튼/딱딱 같은 단발 노이즈 컷 강화 위해 3
    device-index:                   # 빈 값이면 기본 마이크
    server-url: "http://localhost:8080"
    beam-size: 5                    # 빔 서치 크기. 1=속도 우선, 5=권장(정확도↑), 10=느림
    # pokemon-ko-en.json 의 포켓몬 이름은 SttWorkerRunner 가 자동으로 initial_prompt 에 주입.
    # 여기엔 도메인 특화 추가 힌트만 적으면 됨 (방송용어/사람이름/자주 쓰는 문장 등). 빈 값이면 자동 주입만 사용.
    initial-prompt: ""
    # 세그먼트 평균 log-probability 최솟값.
    # 컨트롤러 클릭/배경 노이즈처럼 비음성 입력에서 Whisper가 "찹찹찹", "스테이크스테이크" 같은
    # hallucination을 뱉을 때 보통 -1.5 이하 값이 나옴. 이 임계치보다 낮으면 통째로 드롭.
    #  -1.0 : 권장 (보수적)
    #  -0.8 : 더 공격적 (정상 발화도 일부 컷될 수 있음). 버튼/딱딱 노이즈 컷용
    min-avg-logprob: -0.8

  # 화면 캡처 (발화마다 같이 전송)
  screen:
    source: "obs"                   # "obs" = OBS WebSocket으로 송출 화면, "robot" = 모니터 전체
    monitor-index: 0                # source=robot일 때만. 0 = 주모니터
    obs:
      host: "localhost"
      port: 4455                    # OBS WebSocket 기본 포트
      password: ${OBS_PASSWORD:}    # OBS에 비밀번호 설정한 경우만. 환경변수 OBS_PASSWORD로 주입
      source-name: ""               # 빈 값이면 현재 프로그램 씬을 자동으로 캡처. 특정 소스/씬 이름 지정 가능
      timeout-ms: 3000

  # 발화 트리거 처리
  speech:
    # 봇 발화 중일 때 들어온 발화는 무시
    ignore-during-speech: true
    # 봇 발화 끝나고 N ms 동안 추가로 무시 (스피커 잔향/피드백 컷)
    grace-period-ms: 800
    # 너무 짧은 발화는 무시 (헛기침, "어", "음" 등). 3 이상이면 단음절 hallucination 대부분 컷
    min-text-length: 3
    # 발화 사이 쿨다운 (봇이 한 번 말한 뒤 ms 동안 prefilter가 더 엄격)
    cooldown-ms: 8000
    # 연속 N번 PASS 후 다음 호출에 "이번엔 반드시 응답" 힌트 자동 주입 (적극성 안전망)
    # 0 이면 비활성. 권장: 2~3. respond-only-when-addressed=true 면 무의미.
    nudge-after-pass-count: 2
    # true면 봇 이름 호명("리봇아!") 시에만 응답. 일반 잡담엔 LLM 호출 자체를 안 함 → 완전 수동.
    # false면 모든 발화를 LLM이 보고 PASS/SPEAK 판단 (적극 모드).
    # idle-trigger.enabled=true와 조합 권장 — 호명 응답 + 침묵 시 능동 발문.
    respond-only-when-addressed: false
    # 정규식 prefilter — 이 패턴 매칭하면 Claude 호출 자체를 안 함 (토큰 절약)
    # Java Pattern 문법. 발화 전체 문자열 대상.
    filler-patterns:
      - "^[음어아에오와예네응]+[\\s.?!~ㅋㅎ]*$"          # 단일 추임새
      - "^[ㅋㅎ\\s]{1,10}$"                              # ㅋㅋ, ㅎㅎ 류
      - "^(잠깐만?|어어+|음음+|아아+)[\\s.?!]*$"          # 잠깐만, 어어어 등
      - "^[ㄱ-ㅎㅏ-ㅣ\\s.?!~]+$"                          # 자음/모음 단독 ("ㅋ", "ㄴ", "ㅇㅇ", "ㅎ ㅎ" 등 STT가 버튼소리에 뱉는 자모)
      - "^.{1,2}[.?!~…]*$"                                # 1~2글자 단발 (min-text-length로 대부분 컷되지만 안전망)

    # LLM 출력 비속어 필터 — TTS 직전에 LlmOutputFilter가 적용. 시스템 프롬프트의 욕설 금지가
    # 지켜지지 않는 경우의 안전망. 입력(STT) 쪽 filler-patterns 와는 무관.
    # 매핑 사전은 별도 파일로 분리 (classpath:profanity-mappings.yml, /config UI로 편집 시 cwd 오버라이드).
    profanity-filter:
      # 필터 활성 여부. false면 LLM 응답이 그대로 TTS로 흘러감.
      enabled: true
      # "mask" : 매핑 사전(mappings)에 정의된 단어는 치환해서 그대로 발화. 매핑에 없는데
      #          forbid-patterns에만 걸린 경우엔 PASS 처리(=발화 안 함).
      # "pass" : 금지어/패턴 중 하나라도 걸리면 무조건 PASS. 마스킹 없이 전부 컷.
      mode: "mask"
      # true면 한글 1글자 매핑(예: "개", "좆")은 앞뒤가 한글일 때만 매칭 (false-positive 감소).
      whole-word: false
      # 사용자 오버라이드 매핑 파일 경로. 비어있으면 cwd 의 "./profanity-mappings.yml" 사용.
      # 이 파일이 존재하면 classpath 디폴트를 무시하고 단독 source 가 됨.
      # /config UI 에서 매핑을 저장하면 이 파일에 dump 됨.
      mappings-file: ""

  # 능동 발문 - 정적 시간이 길면 봇이 가끔 먼저 말 걸기. 2단계 ramping.
  #  LIGHT : 유저가 light-threshold-ms 이상 조용 → 가벼운 한 마디 ("뭐 해?", "지루해~")
  #  TOPIC : 유저가 topic-threshold-ms 이상 조용 → 화면 보고 새 화제 던지기
  # 호명-전용 모드(respond-only-when-addressed=true)와 조합 권장 — "호명 응답 + 침묵 시 능동 발문" 패턴.
  idle-trigger:
    enabled: true
    light-threshold-ms: 60000        # 유저가 1분 이상 조용하면 LIGHT 발동
    topic-threshold-ms: 180000       # 유저가 3분 이상 조용하면 TOPIC 격상. 0/음수면 TOPIC 비활성(LIGHT만).
    min-since-bot-ms: 60000          # 봇이 마지막으로 말한지 1분 이상 지났어야
    check-interval-ms: 20000         # 스케줄러 체크 주기
    # idle 전용 시스템 프롬프트. 빈 값이면 CharacterConfig의 내장 디폴트 사용.
    # 비워두는 게 기본. 캐릭터 톤을 더 강하게 묻히고 싶으면 여기에 짧은 페르소나 + 상황 지시를 적기.
    # {name} / {streamer} placeholder 치환됨.
    light-prompt-template: ""
    topic-prompt-template: ""

  # 포켓몬 컨텍스트 - 발화에 포켓몬 이름 감지되면 PokeAPI에서 정보 받아와서 LLM에 주입
  pokemon:
    enabled: true
    pokeapi-base: "https://pokeapi.co/api/v2"
    cache-ttl-sec: 86400

    # 포켓몬 오버레이 (발화와 별개) - 스크린샷에서 포켓몬을 인식해 /pokemon-overlay HTML에 카드로 표시.
    # 켜두면 화면 안의 포켓몬(싱글 2, 더블 4)을 도트/한글명/세대 기준 종족값과 함께 보여줌.
    # OBS 브라우저 소스에 띄워두는 용도. provider는 reaction-bot.llm.provider 그대로 재사용.
    overlay:
      enabled: true
      generation: 9                # 1~9. 해당 세대 시점 종족값/타입 데이터 기준 (BotProperties.Overlay 디폴트와 일치)
      mode: "manual"               # "auto" | "manual" | "speech-precapture"
      refresh-interval-ms: 10000   # auto 모드 폴링 주기. 너무 짧으면 LLM 호출 폭증
      max-pokemon: 2               # 카드 최대 개수. 2=싱글배틀, 4=더블배틀
      infer-moves: false           # true면 LLM에게 기술 4개 추측까지 요청. 응답 더 느려짐
      crop-region: ""              # "x,y,w,h" 0~1 정규화 좌표. 빈 값=전체. 예: "0,0.6,1,0.4"
      # 봇 자체 오버레이를 화면에 함께 띄울 때, 그 영역을 검정 박스로 마스킹해
      # LLM이 자기 카드를 분석 대상으로 잡지 않게 함. ";"로 여러 영역 지정 가능.
      # 예: "0,0,0.25,0.5" (좌측 25% 가로, 위 50% 세로 마스킹)
      ignore-region: ""

logging:
  file:
    # logs/reaction-bot.log 에 적재. Spring Boot 기본 로테이션 (10MB×7개 유지) 자동.
    # 발화 인입/필터 컷/PASS 등 추적용. 문제 재현되면 이 파일 확인.
    name: logs/reaction-bot.log
  level:
    com.jhkim.reactionbot: DEBUG
