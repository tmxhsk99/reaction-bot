<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>화면 번역 — 히스토리</title>
<link rel="stylesheet" href="/font/galmuri/galmuri.css">
<style>
  * { box-sizing: border-box; }
  body {
    font-family: Galmuri11, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    background: #0e1116;
    color: #e6edf3;
    margin: 0;
    padding: 24px 16px;
    image-rendering: pixelated;
  }
  .wrap {
    max-width: 1100px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 16px;
  }
  @media (max-width: 760px) { .wrap { grid-template-columns: 1fr; } }
  h1 {
    font-size: 22px;
    margin: 0 0 8px 0;
    grid-column: 1 / -1;
  }
  .sub {
    grid-column: 1 / -1;
    color: #8b949e;
    font-size: 13px;
    font-family: Galmuri9, sans-serif;
    margin-bottom: 12px;
  }
  .sub a { color: #58a6ff; text-decoration: none; margin-right: 12px; }
  .sub a:hover { text-decoration: underline; }
  .panel {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 6px;
    padding: 12px;
  }
  .panel h2 {
    margin: 0 0 10px 0;
    font-size: 16px;
    color: #58a6ff;
  }
  .date-item {
    /* <button> 디폴트 스타일 리셋 — 키보드 접근성 위해 button 으로 만듦 */
    appearance: none;
    background: transparent;
    color: inherit;
    width: 100%;
    text-align: left;
    font: inherit;

    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 6px;
    border-radius: 4px;
    cursor: pointer;
    border: 1px solid transparent;
    font-size: 14px;
  }
  .date-item:hover { background: #1f2630; }
  .date-item:focus-visible { outline: 2px solid #58a6ff; outline-offset: -2px; }
  .date-item.active { border-color: #58a6ff; background: #1c2434; }
  .date-item .date { font-family: GalmuriMono11, monospace; }
  .date-item .alias {
    flex: 1;
    color: #adbac7;
    font-size: 13px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .date-item .entries {
    font-family: Galmuri9, sans-serif;
    color: #6e7681;
    font-size: 12px;
  }
  .alias-edit {
    margin-top: 4px;
    display: flex;
    gap: 6px;
  }
  .alias-edit input {
    flex: 1;
    background: #0d1117;
    border: 1px solid #30363d;
    color: #e6edf3;
    padding: 4px 8px;
    border-radius: 4px;
    font-family: inherit;
    font-size: 13px;
  }
  .alias-edit button {
    background: #238636;
    color: white;
    border: none;
    padding: 4px 10px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
  }
  .entries-list { max-height: calc(100vh - 200px); overflow-y: auto; padding-right: 4px; }
  .entry {
    background: #0d1117;
    border: 1px solid #21262d;
    border-radius: 4px;
    padding: 10px 12px;
    margin-bottom: 8px;
  }
  .entry .meta {
    display: flex;
    gap: 10px;
    font-family: Galmuri9, sans-serif;
    color: #6e7681;
    font-size: 12px;
    margin-bottom: 6px;
  }
  .entry .speaker {
    color: #d62828;
    font-weight: 700;
    font-size: 16px;
  }
  .entry .translated {
    font-size: 18px;
    margin: 4px 0;
    color: #e6edf3;
    white-space: pre-wrap;
    word-break: keep-all;
  }
  .entry .source {
    font-family: Galmuri9, sans-serif;
    font-size: 13px;
    color: #8b949e;
    border-top: 1px dashed #2d333b;
    padding-top: 6px;
    margin-top: 6px;
    white-space: pre-wrap;
    word-break: keep-all;
  }
  .empty {
    color: #6e7681;
    font-family: Galmuri9, sans-serif;
    text-align: center;
    padding: 40px 12px;
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>화면 번역 히스토리</h1>
  <p class="sub">
    <a href="/">← 홈</a>
    <a href="/translate/">← 실시간 번역</a>
    <a href="/config">설정 →</a>
  </p>

  <div class="panel">
    <h2>일자</h2>
    <div id="date-list"><div class="empty">불러오는 중…</div></div>
  </div>

  <div class="panel">
    <h2 id="entries-title">엔트리</h2>
    <div id="entries-list" class="entries-list"><div class="empty">왼쪽에서 일자를 선택하세요.</div></div>
  </div>
</div>

<script>
const $ = (id) => document.getElementById(id);
const dateListEl = $('date-list');
const entriesListEl = $('entries-list');
const entriesTitleEl = $('entries-title');

let selectedDate = null;

function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => (
    { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]
  ));
}

function formatTs(ts) {
  if (!ts) return '';
  try {
    const d = new Date(ts);
    return d.toLocaleTimeString('ko-KR', { hour12: false });
  } catch (e) { return ts; }
}

async function loadDates() {
  try {
    const res = await fetch('/api/translate/history');
    const list = await res.json();
    renderDates(list);
  } catch (e) {
    dateListEl.innerHTML = '<div class="empty">일자 목록 조회 실패: ' + escapeHtml(e.message) + '</div>';
  }
}

function renderDates(list) {
  if (!list || list.length === 0) {
    dateListEl.innerHTML = '<div class="empty">아직 번역 기록이 없습니다.</div>';
    return;
  }
  dateListEl.innerHTML = '';
  for (const d of list) {
    // 키보드 접근성을 위해 <button> 사용 — Enter/Space 자동 동작.
    const item = document.createElement('button');
    item.type = 'button';
    item.className = 'date-item' + (d.date === selectedDate ? ' active' : '');
    const dateSpan = document.createElement('span');
    dateSpan.className = 'date';
    dateSpan.textContent = d.date;
    const aliasSpan = document.createElement('span');
    aliasSpan.className = 'alias';
    aliasSpan.textContent = d.alias || '';
    const entriesSpan = document.createElement('span');
    entriesSpan.className = 'entries';
    entriesSpan.textContent = d.entries + '건';
    item.appendChild(dateSpan);
    item.appendChild(aliasSpan);
    item.appendChild(entriesSpan);
    item.addEventListener('click', () => selectDate(d.date, d.alias));
    dateListEl.appendChild(item);

    // 별칭 편집 줄
    const editRow = document.createElement('div');
    editRow.className = 'alias-edit';
    const aliasInput = document.createElement('input');
    aliasInput.type = 'text';
    aliasInput.placeholder = '별칭 (예: 페르소나5 1일차)';
    aliasInput.value = d.alias || '';
    const saveBtn = document.createElement('button');
    saveBtn.type = 'button';
    saveBtn.textContent = '별칭 저장';
    saveBtn.addEventListener('click', async (ev) => {
      ev.stopPropagation();
      saveBtn.disabled = true;
      try {
        const res = await fetch('/api/translate/history/' + encodeURIComponent(d.date) + '/alias', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ alias: aliasInput.value }),
        });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        // 현재 선택된 날짜의 별칭이면 우측 타이틀도 같이 갱신.
        if (d.date === selectedDate) {
          const newAlias = aliasInput.value.trim();
          entriesTitleEl.textContent = d.date + (newAlias ? ' — ' + newAlias : '');
        }
        await loadDates();
      } catch (e) {
        alert('별칭 저장 실패: ' + e.message);
      } finally {
        saveBtn.disabled = false;
      }
    });
    aliasInput.addEventListener('click', (ev) => ev.stopPropagation());
    editRow.appendChild(aliasInput);
    editRow.appendChild(saveBtn);
    dateListEl.appendChild(editRow);
  }
}

async function selectDate(date, alias) {
  selectedDate = date;
  for (const el of dateListEl.querySelectorAll('.date-item')) {
    el.classList.toggle('active',
        el.querySelector('.date') && el.querySelector('.date').textContent === date);
  }
  entriesTitleEl.textContent = date + (alias ? ' — ' + alias : '');
  entriesListEl.innerHTML = '<div class="empty">불러오는 중…</div>';
  try {
    const res = await fetch('/api/translate/history/' + encodeURIComponent(date));
    const entries = await res.json();
    renderEntries(entries);
  } catch (e) {
    entriesListEl.innerHTML = '<div class="empty">조회 실패: ' + escapeHtml(e.message) + '</div>';
  }
}

function renderEntries(entries) {
  if (!entries || entries.length === 0) {
    entriesListEl.innerHTML = '<div class="empty">엔트리가 없습니다.</div>';
    return;
  }
  entriesListEl.innerHTML = '';
  for (const e of entries) {
    const card = document.createElement('div');
    card.className = 'entry';
    const meta = '<span>' + escapeHtml(formatTs(e.ts)) + '</span>'
               + (e.sourceLang ? '<span>' + escapeHtml(e.sourceLang) + ' → ' + escapeHtml(e.targetLang || '') + '</span>' : '');
    const speakerHtml = e.speaker ? '<div class="speaker">' + escapeHtml(e.speaker) + '</div>' : '';
    const translatedHtml = '<div class="translated">' + escapeHtml(e.translated || '') + '</div>';
    const sourceHtml = e.source ? '<div class="source">원문: ' + escapeHtml(e.source) + '</div>' : '';
    card.innerHTML = '<div class="meta">' + meta + '</div>' + speakerHtml + translatedHtml + sourceHtml;
    entriesListEl.appendChild(card);
  }
}

loadDates();
</script>
</body>
</html>
