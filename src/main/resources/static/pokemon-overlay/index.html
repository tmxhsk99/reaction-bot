<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<!-- 개발 중 캐시 잔존으로 옛 JS가 실행되는 사고 방지. WebConfig.setCachePeriod(0) 와 이중 안전망. -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Reaction Bot — Pokémon Overlay</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo",
                 "Noto Sans KR", "Malgun Gothic", sans-serif;
    margin: 0;
    padding: 12px;
    background: transparent;        /* OBS 브라우저 소스에서 투명 합성용 */
    color: #f5f7fa;
    text-shadow: 0 1px 2px rgba(0,0,0,0.85);
  }

  /* 전체 컨테이너는 자식의 최대 폭에 맞춰지도록 inline-flex column.
     모든 카드/헤더가 align-items:stretch 로 같은 폭을 따라가 빈 공간이 안 생긴다. */
  .root { display: inline-flex; flex-direction: column; gap: 8px; align-items: stretch; }

  /* 헤더 카드: 좌측에 기준 세대/미러전, 우측 끝에 분석 버튼. 본문 카드와 동일한 시각 톤. */
  .gen-banner {
    background: rgba(8,12,18,0.82);
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: 10px;
    padding: 8px 12px;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.5px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .gen-banner .label { color: #9aa7b6; font-size: 11px; font-weight: 500; }
  .gen-banner .gen { color: #58a6ff; font-size: 17px; }
  .gen-banner .mirror {
    margin-left: 4px;
    background: #b3261e;
    color: #fff;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 99px;
    text-shadow: none;
  }
  /* ?demo=1 일 때만 노란색 DEMO 배지. 실서버에서 절대 안 보여야 함. */
  .gen-banner .demo {
    margin-left: 4px;
    background: #d29922;
    color: #000;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 99px;
    text-shadow: none;
    font-weight: 800;
  }
  /* 분석 버튼이 항상 헤더 우측 끝으로 가도록 spacer */
  .gen-banner .spacer { flex: 1; }

  .cards { display: flex; flex-direction: column; gap: 8px; }
  .card {
    display: flex;
    align-items: stretch;
    background: rgba(8,12,18,0.82);
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: 12px;
    padding: 10px 12px;
    box-shadow: 0 4px 18px rgba(0,0,0,0.45);
  }
  .card .main-col {
    display: flex;
    flex-direction: column;
    flex: 1;
    min-width: 0;
    margin-right: 12px;
  }
  .card .speed-rank {
    color: #f0c674;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.5px;
    margin-bottom: 2px;
  }
  .card .name-row { display: flex; align-items: center; gap: 8px; }
  .card .ko-name { font-size: 18px; font-weight: 700; }
  .card .sprite {
    width: 56px; height: 56px;
    image-rendering: pixelated;
    background: rgba(255,255,255,0.04);
    border-radius: 8px;
  }
  .card .types { display: flex; gap: 4px; margin-top: 6px; flex-wrap: wrap; }
  .card .type {
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 4px;
    text-transform: capitalize;
    text-shadow: none;
    background: #555;
    color: #fff;
  }
  /* HAB 한 줄 / CDS 한 줄. 6개 셀이 3열로 흘러 2행이 된다. */
  .card .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 4px 10px;
    align-items: center;
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid rgba(255,255,255,0.08);
  }
  .card .stat { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .card .stat .lbl { font-size: 10px; color: #9aa7b6; font-weight: 600; }
  .card .stat .val { font-size: 14px; font-weight: 700; }
  .card .stat.high .val { color: #56d364; }
  .card .stat.low .val { color: #d29922; }

  .card .weak-col {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    padding-left: 12px;
    border-left: 1px solid rgba(255,255,255,0.08);
  }
  .card .weak-col .lbl {
    font-size: 10px;
    color: #f85149;
    font-weight: 700;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }
  /* 한 줄에 최대 2칸 고정. 3개 이상은 다음 줄로 자동 흐름. */
  .card .weak-col .weaks {
    display: grid;
    grid-template-columns: repeat(2, max-content);
    gap: 4px;
  }
  .card .weak-col .weak {
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 4px;
    text-transform: capitalize;
    text-shadow: none;
    background: #555;
    color: #fff;
    position: relative;
  }
  .card .weak-col .weak.x4 { box-shadow: inset 0 0 0 2px #f85149; }
  .card .weak-col .weak .mult {
    font-size: 9px;
    opacity: 0.85;
    margin-left: 3px;
  }
  .card .weak-col .none {
    font-size: 10px;
    color: #6e7681;
  }

  .empty {
    background: rgba(8,12,18,0.78);
    border: 1px dashed rgba(255,255,255,0.15);
    border-radius: 10px;
    padding: 14px 18px;
    font-size: 13px;
    color: #9aa7b6;
  }

  /* 헤더 안 컴팩트 분석 버튼. 키 단축키 안내(Enter)도 함께. */
  .analyze-btn {
    background: #238636;
    color: white;
    border: none;
    padding: 6px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    text-shadow: none;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .analyze-btn:hover { background: #2ea043; }
  .analyze-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .analyze-btn .kbd {
    background: rgba(0,0,0,0.35);
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 4px;
    padding: 0 5px;
    font-size: 10px;
    font-weight: 700;
    line-height: 14px;
  }

  .err {
    color: #f85149;
    font-size: 11px;
    margin-top: 4px;
  }

  .hidden { display: none !important; }

  /* ?edit=1 시 헤더 아래 표시되는 수동 입력 바. OBS 송출 창에는 안 보임. */
  .manual-bar {
    background: rgba(8,12,18,0.82);
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: 10px;
    padding: 8px 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .manual-bar input {
    flex: 1;
    min-width: 0;
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 6px;
    color: #e6edf3;
    font-size: 12px;
    font-family: inherit;
    padding: 6px 8px;
    text-shadow: none;
  }
  .manual-bar input:focus { outline: none; border-color: #58a6ff; }
  .manual-bar button {
    background: #1f6feb;
    color: white;
    border: none;
    padding: 6px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 11px;
    font-weight: 600;
    text-shadow: none;
  }
  .manual-bar button.clear { background: #6e7681; }
  .manual-bar button:hover { filter: brightness(1.1); }
  .manual-bar .hint { color: #6e7681; font-size: 10px; margin-right: 4px; }

  /* manual-bar 아래 자동완성 칩 패널. 결과 있을 때만 노출. */
  .suggest {
    background: rgba(8,12,18,0.92);
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: 8px;
    padding: 6px 8px;
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: -2px;
  }
  .suggest .empty-hint {
    color: #6e7681;
    font-size: 10px;
    padding: 2px 4px;
  }
  .suggest .chip {
    font-size: 11px;
    background: #21262d;
    color: #c9d1d9;
    border: 1px solid #30363d;
    border-radius: 6px;
    padding: 3px 8px;
    cursor: pointer;
    text-shadow: none;
    user-select: none;
  }
  .suggest .chip:hover { background: #30363d; }
  .suggest .chip.active { background: #1f6feb; border-color: #1f6feb; color: white; }
</style>
</head>
<body>
<div id="root" class="root">
  <div id="genBanner" class="gen-banner">
    <span class="label">기준 세대</span>
    <span class="gen" id="genLabel">—</span>
    <span class="mirror hidden" id="mirrorTag">미러전</span>
    <span class="demo hidden" id="demoTag">DEMO</span>
    <span class="spacer"></span>
    <button id="analyzeBtn" class="analyze-btn hidden" title="분석 (Enter)">
      분석 <span class="kbd">Enter</span>
    </button>
  </div>
  <!-- ?edit=1 일 때만 표시되는 수동 입력 바. OBS 송출 창과 분리. -->
  <div id="manualBar" class="manual-bar hidden">
    <span class="hint">수동:</span>
    <input id="manualInput" type="text" placeholder="한카리아스, ガブリアス, garchomp …" autocomplete="off">
    <button id="manualApply" title="적용 (Shift+Enter)">적용</button>
    <button id="manualClear" class="clear" title="카드 초기화">초기화</button>
  </div>
  <!-- 자동완성 후보 패널. 결과 있을 때만 렌더. -->
  <div id="suggestPanel" class="suggest hidden"></div>
  <div id="cards" class="cards"></div>
  <!-- 첫 로드 시 빈 페이지로 보이지 않도록 empty 메시지를 기본 노출. -->
  <div id="empty" class="empty">화면에서 포켓몬을 감지하지 못했습니다.</div>
  <div id="err" class="err hidden"></div>
</div>

<script>
  // 타입별 컬러 (PokéAPI 영문 type name 기준)
  const TYPE_COLOR = {
    normal:'#a8a878', fire:'#f08030', water:'#6890f0', electric:'#f8d030',
    grass:'#78c850', ice:'#98d8d8', fighting:'#c03028', poison:'#a040a0',
    ground:'#e0c068', flying:'#a890f0', psychic:'#f85888', bug:'#a8b820',
    rock:'#b8a038', ghost:'#705898', dragon:'#7038f8', dark:'#705848',
    steel:'#b8b8d0', fairy:'#ee99ac'
  };
  // PokéAPI 영문 type name → 한글
  const TYPE_KO = {
    normal:'노말', fire:'불꽃', water:'물', electric:'전기',
    grass:'풀', ice:'얼음', fighting:'격투', poison:'독',
    ground:'땅', flying:'비행', psychic:'에스퍼', bug:'벌레',
    rock:'바위', ghost:'고스트', dragon:'드래곤', dark:'악',
    steel:'강철', fairy:'페어리'
  };
  const STAT_LABELS = ['H','A','B','C','D','S'];

  function isHigh(v) { return v >= 110; }
  function isLow(v)  { return v <= 60; }

  function buildCardEl(card) {
    const el = document.createElement('div');
    el.className = 'card';

    const mainCol = document.createElement('div');
    mainCol.className = 'main-col';

    const rank = document.createElement('div');
    rank.className = 'speed-rank';
    rank.textContent = `${ordinal(card.speedRank)} · 스피드 ${card.spe}`;
    mainCol.appendChild(rank);

    const nameRow = document.createElement('div');
    nameRow.className = 'name-row';
    const ko = document.createElement('div');
    ko.className = 'ko-name';
    ko.textContent = card.nameKo;
    nameRow.appendChild(ko);
    if (card.spriteUrl) {
      const img = document.createElement('img');
      img.className = 'sprite';
      img.src = card.spriteUrl;
      img.alt = card.nameKo;
      nameRow.appendChild(img);
    }
    mainCol.appendChild(nameRow);

    const types = document.createElement('div');
    types.className = 'types';
    (card.types || []).forEach(t => {
      const span = document.createElement('span');
      span.className = 'type';
      span.textContent = TYPE_KO[t] || t;
      span.style.background = TYPE_COLOR[t] || '#666';
      types.appendChild(span);
    });
    mainCol.appendChild(types);

    const stats = document.createElement('div');
    stats.className = 'stats';
    const vals = [card.hp, card.atk, card.def, card.spa, card.spd, card.spe];
    STAT_LABELS.forEach((label, i) => {
      const wrap = document.createElement('div');
      wrap.className = 'stat';
      if (isHigh(vals[i])) wrap.classList.add('high');
      if (isLow(vals[i])) wrap.classList.add('low');
      const lbl = document.createElement('div');
      lbl.className = 'lbl';
      lbl.textContent = label;
      const val = document.createElement('div');
      val.className = 'val';
      val.textContent = vals[i];
      wrap.appendChild(lbl);
      wrap.appendChild(val);
      stats.appendChild(wrap);
    });
    mainCol.appendChild(stats);
    el.appendChild(mainCol);

    // 우측: 약점 타입.
    // weaknesses 는 ["fairy", "dragon"] 또는 [{type:"ice", mult:4}, {type:"fairy", mult:2}] 둘 다 지원.
    const weakCol = document.createElement('div');
    weakCol.className = 'weak-col';
    const wlbl = document.createElement('div');
    wlbl.className = 'lbl';
    wlbl.textContent = '약점';
    weakCol.appendChild(wlbl);

    const weaks = card.weaknesses || [];
    if (weaks.length === 0) {
      const none = document.createElement('div');
      none.className = 'none';
      none.textContent = '—';
      weakCol.appendChild(none);
    } else {
      const list = document.createElement('div');
      list.className = 'weaks';
      weaks.forEach(w => {
        const type = (typeof w === 'string') ? w : w.type;
        const mult = (typeof w === 'string') ? 2 : (w.mult || 2);
        const span = document.createElement('span');
        span.className = 'weak' + (mult >= 4 ? ' x4' : '');
        span.style.background = TYPE_COLOR[type] || '#666';
        span.textContent = TYPE_KO[type] || type;
        if (mult >= 4) {
          const m = document.createElement('span');
          m.className = 'mult';
          m.textContent = '×4';
          span.appendChild(m);
        }
        list.appendChild(span);
      });
      weakCol.appendChild(list);
    }
    el.appendChild(weakCol);

    return el;
  }

  function ordinal(n) {
    if (n === 1) return '1번째 빠름';
    if (n === 2) return '2번째 빠름';
    if (n === 3) return '3번째 빠름';
    if (n === 4) return '4번째 빠름';
    return `${n}번째`;
  }

  let lastSig = '';

  function render(state) {
    document.getElementById('genLabel').textContent = `${state.generation}세대`;
    document.getElementById('mirrorTag').classList.toggle('hidden', !state.mirror);
    // 분석 버튼은 manual 모드에서만 노출. 다른 모드에선 자동 트리거라 불필요.
    document.getElementById('analyzeBtn').classList.toggle('hidden', state.mode !== 'manual');

    const err = document.getElementById('err');
    if (state.lastError) {
      err.textContent = state.lastError;
      err.classList.remove('hidden');
    } else {
      err.classList.add('hidden');
    }

    // 변화 없으면 DOM 재구성 생략 (스프라이트 깜박임 방지)
    const sig = JSON.stringify({
      mode: state.mode, gen: state.generation, mirror: state.mirror,
      cards: (state.cards || []).map(c => [
        c.slug, c.speedRank, c.hp, c.atk, c.def, c.spa, c.spd, c.spe,
        (c.types || []).join('/'),
        (c.weaknesses || []).map(w => typeof w === 'string' ? w : (w.type + ':' + (w.mult || 2))).join(',')
      ])
    });
    if (sig === lastSig) return;
    lastSig = sig;

    const cardsEl = document.getElementById('cards');
    cardsEl.innerHTML = '';
    const empty = document.getElementById('empty');
    if (!state.cards || state.cards.length === 0) {
      empty.classList.remove('hidden');
    } else {
      empty.classList.add('hidden');
      state.cards.forEach(c => cardsEl.appendChild(buildCardEl(c)));
    }
  }

  // ?demo=1 이면 서버 fetch 대신 더미 state 렌더 (레이아웃 확인용).
  // ※ 자동 폴백은 제거. 실서버에서 첫 fetch가 한 번 끊겼다고 데모에 갇히면
  //   이후 분석 버튼이 백엔드를 안 부르게 되어 사용자 혼란을 만듦.
  const DEMO_MODE = new URLSearchParams(location.search).get('demo') === '1';
  // ?edit=1 시 수동 입력 바 노출 (관리용 모니터 창에만 띄움. OBS 송출 창은 ?edit 빼고).
  const EDIT_MODE = new URLSearchParams(location.search).get('edit') === '1';
  let demoMirror = false;
  if (DEMO_MODE) {
    console.warn('[overlay] DEMO_MODE 활성 — ?demo=1 쿼리가 붙어있어 서버를 호출하지 않습니다.');
    document.getElementById('demoTag').classList.remove('hidden');
  }
  if (EDIT_MODE) {
    document.getElementById('manualBar').classList.remove('hidden');
    console.log('[overlay] EDIT_MODE 활성 — 수동 입력 바 표시 (?edit=1).');
  }

  function demoState() {
    const cards = demoMirror ? [
      // 미러전 데모: 잠만보 2마리
      { slug:'snorlax', nameKo:'잠만보', nameJa:'カビゴン', generation:1,
        types:['normal'], hp:160, atk:110, def:65, spa:65, spd:110, spe:30,
        statTotal:540, speedRank:1, spriteUrl:'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/143.png', artworkUrl:'',
        weaknesses:[{type:'fighting',mult:2}], inferredMoves:[] },
      { slug:'snorlax', nameKo:'잠만보', nameJa:'カビゴン', generation:1,
        types:['normal'], hp:160, atk:110, def:65, spa:65, spd:110, spe:30,
        statTotal:540, speedRank:2, spriteUrl:'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/143.png', artworkUrl:'',
        weaknesses:[{type:'fighting',mult:2}], inferredMoves:[] }
    ] : [
      { slug:'garchomp', nameKo:'한카리아스', nameJa:'ガブリアス', generation:4,
        types:['dragon','ground'], hp:108, atk:130, def:95, spa:80, spd:85, spe:102,
        statTotal:600, speedRank:1, spriteUrl:'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/445.png', artworkUrl:'',
        weaknesses:[{type:'ice',mult:4},{type:'dragon',mult:2},{type:'fairy',mult:2}], inferredMoves:[] },
      { slug:'ho-oh', nameKo:'칠색조', nameJa:'ホウオウ', generation:2,
        types:['fire','flying'], hp:106, atk:130, def:90, spa:110, spd:154, spe:90,
        statTotal:680, speedRank:2, spriteUrl:'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/250.png', artworkUrl:'',
        weaknesses:[{type:'rock',mult:4},{type:'water',mult:2},{type:'electric',mult:2}], inferredMoves:[] },
      { slug:'gardevoir', nameKo:'가디안', nameJa:'サーナイト', generation:3,
        types:['psychic','fairy'], hp:68, atk:65, def:65, spa:125, spd:115, spe:80,
        statTotal:518, speedRank:3, spriteUrl:'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/282.png', artworkUrl:'',
        weaknesses:[{type:'ghost',mult:2},{type:'steel',mult:2},{type:'poison',mult:2}], inferredMoves:[] },
      { slug:'snorlax', nameKo:'잠만보', nameJa:'カビゴン', generation:1,
        types:['normal'], hp:160, atk:110, def:65, spa:65, spd:110, spe:30,
        statTotal:540, speedRank:4, spriteUrl:'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/143.png', artworkUrl:'',
        weaknesses:[{type:'fighting',mult:2}], inferredMoves:[] }
    ];
    return {
      enabled: true, generation: 8, mode: 'manual', maxPokemon: 4,
      mirror: demoMirror, lastError: null, updatedAt: new Date().toISOString(),
      cards
    };
  }

  async function fetchState() {
    if (DEMO_MODE) { render(demoState()); return; }
    try {
      const r = await fetch('/api/pokemon-overlay/state', { cache: 'no-store' });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      render(await r.json());
    } catch (e) {
      // 폴링 fetch 실패는 콘솔에만. 매 회 카드를 지우면 깜박임 → 그냥 무시.
      console.debug('[overlay] state fetch 실패 (서버가 안 떠있을 수 있음):', e.message);
    }
  }

  // 버튼 라벨 + Enter kbd 보존. textContent 로 덮으면 kbd span이 사라져서 매번 복원.
  const ANALYZE_LABEL = '분석 <span class="kbd">Enter</span>';
  function setAnalyzeBtnState(text, busy) {
    const btn = document.getElementById('analyzeBtn');
    btn.disabled = busy;
    btn.innerHTML = busy ? text : ANALYZE_LABEL;
  }

  document.getElementById('analyzeBtn').addEventListener('click', async () => {
    setAnalyzeBtnState('분석 중…', true);
    const errEl = document.getElementById('err');
    errEl.classList.add('hidden');
    try {
      if (DEMO_MODE) {
        demoMirror = !demoMirror;
        lastSig = '';
        render(demoState());
        console.log('[overlay] DEMO 모드 — 미러전 토글:', demoMirror);
      } else {
        console.log('[overlay] POST /api/pokemon-overlay/analyze …');
        const r = await fetch('/api/pokemon-overlay/analyze', { method: 'POST' });
        console.log('[overlay] HTTP', r.status);
        if (!r.ok) throw new Error('HTTP ' + r.status);
        const state = await r.json();
        console.log('[overlay] state:', state);
        if (state.lastError) console.warn('[overlay] lastError:', state.lastError);
        render(state);
      }
    } catch (e) {
      console.error('[overlay] analyze 실패:', e);
      errEl.textContent = '분석 호출 실패: ' + e.message;
      errEl.classList.remove('hidden');
    } finally {
      setAnalyzeBtnState('', false);
    }
  });

  // 수동 입력 적용. 입력값을 콤마/공백으로 split해서 서버에 names 배열로 전송.
  async function applyManual() {
    if (DEMO_MODE) { console.debug('[overlay] DEMO 모드 — manual apply 무시'); return; }
    const input = document.getElementById('manualInput');
    const raw = (input.value || '').trim();
    if (!raw) return;
    // 콤마 또는 일본어 콤마(、) 또는 줄바꿈으로 분리. 공백만으로 분리하면 한글 이름이 잘림.
    const names = raw.split(/[,、\n]+/).map(s => s.trim()).filter(Boolean);
    if (names.length === 0) return;
    console.log('[overlay] POST /api/pokemon-overlay/manual', names);
    try {
      const r = await fetch('/api/pokemon-overlay/manual', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ names })
      });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const state = await r.json();
      console.log('[overlay] manual state:', state);
      if (state.lastError) console.warn('[overlay] lastError:', state.lastError);
      render(state);
    } catch (e) {
      console.error('[overlay] manual 실패:', e);
      const err = document.getElementById('err');
      err.textContent = '수동 입력 실패: ' + e.message;
      err.classList.remove('hidden');
    }
  }

  async function clearCards() {
    if (DEMO_MODE) { console.debug('[overlay] DEMO 모드 — clear 무시'); return; }
    console.log('[overlay] DELETE /api/pokemon-overlay/cards');
    try {
      const r = await fetch('/api/pokemon-overlay/cards', { method: 'DELETE' });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      render(await r.json());
      document.getElementById('manualInput').value = '';
    } catch (e) {
      console.error('[overlay] clear 실패:', e);
    }
  }

  document.getElementById('manualApply').addEventListener('click', applyManual);
  document.getElementById('manualClear').addEventListener('click', clearCards);

  // ----- 자동완성 -----
  // 입력값의 마지막 토큰만 query로 사용. 토큰 구분자: , 、 \n 공백.
  function lastToken(s) {
    if (!s) return '';
    const parts = s.split(/[,、\n]+/);
    const last = parts[parts.length - 1] || '';
    return last.trim();
  }

  // 칩 클릭 시 마지막 토큰을 선택한 이름으로 교체 + 콤마/공백 추가.
  function replaceLastToken(name) {
    const input = document.getElementById('manualInput');
    const v = input.value;
    // 마지막 구분자 인덱스 찾기 (없으면 -1)
    let lastSep = -1;
    for (let i = v.length - 1; i >= 0; i--) {
      const c = v[i];
      if (c === ',' || c === '、' || c === '\n') { lastSep = i; break; }
    }
    const head = lastSep >= 0 ? v.slice(0, lastSep + 1) : '';
    const sep = lastSep >= 0 && !head.endsWith(' ') ? ' ' : '';
    input.value = head + sep + name + ', ';
    input.focus();
    // 칩 패널 비우기 (선택 완료 신호)
    renderSuggest([], '');
  }

  let suggestSeq = 0;     // 가장 최근 요청만 반영하기 위한 시퀀스
  let suggestActiveIdx = -1; // 키보드 네비게이션 활성 인덱스
  let suggestCache = [];     // 현재 칩 리스트 (Enter/Tab 결정용)

  function renderSuggest(list, queryHint) {
    const panel = document.getElementById('suggestPanel');
    suggestCache = list || [];
    suggestActiveIdx = list && list.length > 0 ? 0 : -1;
    panel.innerHTML = '';
    if (!list || list.length === 0) {
      // 인덱스 미빌드 등 빈 응답 시 hint만 잠깐 보여주려다가 — 사용자에게 거슬릴 수 있어 그냥 숨김.
      panel.classList.add('hidden');
      return;
    }
    panel.classList.remove('hidden');
    list.forEach((name, i) => {
      const chip = document.createElement('span');
      chip.className = 'chip' + (i === suggestActiveIdx ? ' active' : '');
      chip.textContent = name;
      chip.addEventListener('mousedown', (e) => {
        // mousedown 으로 처리해야 input의 blur 보다 먼저 발화 (focus 안 잃음)
        e.preventDefault();
        replaceLastToken(name);
      });
      panel.appendChild(chip);
    });
  }

  function updateActiveChip() {
    const panel = document.getElementById('suggestPanel');
    Array.from(panel.children).forEach((el, i) => {
      el.classList.toggle('active', i === suggestActiveIdx);
    });
  }

  let suggestTimer = null;
  async function fetchSuggest() {
    if (DEMO_MODE) { renderSuggest([], ''); return; }
    const input = document.getElementById('manualInput');
    const q = lastToken(input.value);
    if (q.length < 1) {
      renderSuggest([], '');
      return;
    }
    const mySeq = ++suggestSeq;
    try {
      const r = await fetch('/api/pokemon-overlay/suggest?q=' + encodeURIComponent(q) + '&limit=10', { cache: 'no-store' });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      if (mySeq !== suggestSeq) return; // 더 새 요청이 들어옴 — 폐기
      const list = await r.json();
      renderSuggest(list, q);
    } catch (e) {
      // 서버 끊김 / 인덱스 미빌드 → 칩 캐시 정리. Enter/Tab 으로 옛 후보가 잘못 커밋되는 것 차단.
      console.debug('[overlay] suggest 실패:', e.message);
      if (mySeq === suggestSeq) renderSuggest([], '');
    }
  }

  document.getElementById('manualInput').addEventListener('input', () => {
    clearTimeout(suggestTimer);
    suggestTimer = setTimeout(fetchSuggest, 180);
  });

  document.getElementById('manualInput').addEventListener('blur', () => {
    // 패널이 mousedown으로 미리 처리되므로 blur 시 단순 숨김.
    setTimeout(() => document.getElementById('suggestPanel').classList.add('hidden'), 150);
  });
  document.getElementById('manualInput').addEventListener('focus', () => {
    if (suggestCache.length > 0) document.getElementById('suggestPanel').classList.remove('hidden');
  });

  // 입력 필드 안에서 ↑/↓ 로 칩 네비게이션, Tab/→ 로 선택, Enter 로 수동 적용.
  // 페이지 다른 곳에선 Enter = 분석 버튼, Shift+Enter = 수동 적용.
  window.addEventListener('keydown', (e) => {
    const focusInput = document.activeElement && document.activeElement.id === 'manualInput';

    // 입력 필드 포커스 + 칩 표시 중일 때만 자동완성 네비게이션 인터셉트
    if (focusInput && suggestCache.length > 0) {
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        suggestActiveIdx = (suggestActiveIdx + 1) % suggestCache.length;
        updateActiveChip();
        return;
      }
      if (e.key === 'ArrowUp') {
        e.preventDefault();
        suggestActiveIdx = (suggestActiveIdx - 1 + suggestCache.length) % suggestCache.length;
        updateActiveChip();
        return;
      }
      if (e.key === 'Tab' || e.key === 'ArrowRight') {
        // Tab은 기본 동작이 다음 폼 요소로 이동 — 칩 선택이 자연스러움.
        // ArrowRight는 캐럿 이동과 충돌 가능하나, 입력 끝일 때만 인터셉트.
        const input = document.getElementById('manualInput');
        if (e.key === 'ArrowRight' && input.selectionStart < input.value.length) return;
        if (suggestActiveIdx >= 0) {
          e.preventDefault();
          replaceLastToken(suggestCache[suggestActiveIdx]);
        }
        return;
      }
      if (e.key === 'Escape') {
        e.preventDefault();
        renderSuggest([], '');
        return;
      }
    }

    if (e.key !== 'Enter') return;
    if (focusInput) {
      // 입력 필드 안에서 Enter: 칩 활성이면 칩 선택, 아니면 수동 적용
      e.preventDefault();
      if (suggestCache.length > 0 && suggestActiveIdx >= 0) {
        replaceLastToken(suggestCache[suggestActiveIdx]);
      } else {
        applyManual();
      }
      return;
    }
    if (e.shiftKey && EDIT_MODE) {
      e.preventDefault();
      applyManual();
      return;
    }
    const btn = document.getElementById('analyzeBtn');
    if (!btn || btn.classList.contains('hidden') || btn.disabled) return;
    e.preventDefault();
    btn.click();
  });

  // 폴링: 상태 변화는 서버가 가지고 있으니 클라이언트는 단순 폴링이면 충분.
  fetchState();
  if (!DEMO_MODE) setInterval(fetchState, 1500);
</script>
