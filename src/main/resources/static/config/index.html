<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Reaction Bot — 설정</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo",
                 "Noto Sans KR", "Malgun Gothic", sans-serif;
    margin: 0;
    background: #0e1116;
    color: #e6edf3;
    padding: 32px 16px;
  }
  .container { max-width: 720px; margin: 0 auto; }
  h1 { margin: 0 0 8px; font-size: 24px; }
  p.sub { color: #8b949e; margin: 0 0 24px; font-size: 14px; }
  .card {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .card h2 { margin: 0 0 16px; font-size: 16px; color: #58a6ff; }
  label { display: block; margin: 12px 0 4px; font-size: 13px; color: #c9d1d9; }
  input[type="text"], input[type="password"], select {
    width: 100%;
    padding: 8px 10px;
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 6px;
    color: #e6edf3;
    font-size: 14px;
  }
  input:focus, select:focus { outline: none; border-color: #58a6ff; }
  .hint { color: #6e7681; font-size: 12px; margin-top: 4px; }
  .row { display: flex; gap: 12px; }
  .row > div { flex: 1; }
  .toggle { display: flex; align-items: center; gap: 8px; margin: 12px 0; }
  .toggle input { width: auto; }
  button {
    background: #238636;
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
  }
  button:hover { background: #2ea043; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .status {
    margin-top: 16px;
    padding: 12px;
    border-radius: 6px;
    font-size: 14px;
    display: none;
  }
  .status.ok { background: #033a16; color: #56d364; border: 1px solid #238636; display: block; }
  .status.err { background: #3a0a0a; color: #f85149; border: 1px solid #da3633; display: block; }
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 11px;
    background: #21262d;
    color: #8b949e;
    margin-left: 6px;
  }
  .links { margin-top: 24px; color: #6e7681; font-size: 13px; }
  .links a { color: #58a6ff; text-decoration: none; margin-right: 12px; }
  .links a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="container">
  <h1>Reaction Bot 설정</h1>
  <p class="sub">변경 후 <strong>저장</strong> → 적용하려면 서버를 한 번 재기동하세요.</p>

  <form id="form">
    <div class="card">
      <h2>API 키 <span class="badge">필수</span></h2>

      <label>Anthropic API Key</label>
      <input type="password" name="reaction-bot.anthropic.api-key" placeholder="sk-ant-...">
      <div class="hint">https://console.anthropic.com/settings/keys 에서 발급. 비워 두면 환경변수 ANTHROPIC_API_KEY 사용.</div>
    </div>

    <div class="card">
      <h2>캐릭터</h2>

      <div class="row">
        <div>
          <label>봇 이름</label>
          <input type="text" name="reaction-bot.character.name">
        </div>
        <div>
          <label>스트리머 이름</label>
          <input type="text" name="reaction-bot.character.streamer-name">
        </div>
      </div>
    </div>

    <div class="card">
      <h2>TTS (음성 합성)</h2>

      <label>Provider</label>
      <select name="reaction-bot.tts.provider">
        <option value="azure">azure — 한국어 음성 10개 (Azure 키 필요)</option>
        <option value="edge">edge — 무료, 한국어 3개</option>
      </select>

      <label>Voice (provider에 맞는 이름)</label>
      <input type="text" name="reaction-bot.tts.voice" list="voice-options">
      <datalist id="voice-options">
        <option value="ko-KR-JiMinNeural">
        <option value="ko-KR-SunHiNeural">
        <option value="ko-KR-YuJinNeural">
        <option value="ko-KR-SeoHyeonNeural">
        <option value="ko-KR-SoonBokNeural">
        <option value="ko-KR-InJoonNeural">
        <option value="ko-KR-BongJinNeural">
        <option value="ko-KR-GookMinNeural">
        <option value="ko-KR-HyunsuNeural">
        <option value="ko-KR-HyunsuMultilingualNeural">
      </datalist>

      <div class="row">
        <div>
          <label>Azure Speech Key (provider=azure일 때 필요)</label>
          <input type="password" name="reaction-bot.tts.azure.key">
        </div>
        <div>
          <label>Azure Region</label>
          <input type="text" name="reaction-bot.tts.azure.region" placeholder="koreacentral">
        </div>
      </div>
    </div>

    <div class="card">
      <h2>화면 캡처</h2>
      <label>Source</label>
      <select name="reaction-bot.screen.source">
        <option value="obs">obs — OBS WebSocket으로 송출 화면</option>
        <option value="robot">robot — 모니터 전체</option>
      </select>

      <label>OBS WebSocket Password (OBS에 비번 걸어둔 경우만)</label>
      <input type="password" name="reaction-bot.screen.obs.password">
    </div>

    <div class="card">
      <h2>동작</h2>

      <div class="toggle">
        <input type="checkbox" id="stt-auto" name="reaction-bot.stt.auto-start">
        <label for="stt-auto" style="margin:0;">STT 워커 자동 시작 (마이크 켤지)</label>
      </div>

      <div class="toggle">
        <input type="checkbox" id="idle-trigger" name="reaction-bot.idle-trigger.enabled">
        <label for="idle-trigger" style="margin:0;">능동 발문 (조용할 때 봇이 먼저 말 걸기)</label>
      </div>
    </div>

    <button type="submit" id="save-btn">저장</button>
  </form>

  <div id="status" class="status"></div>

  <div class="links">
    <a href="/avatar/" target="_blank">아바타 미리보기 →</a>
    <a href="/api/status" target="_blank">서버 상태 →</a>
    <a href="https://console.anthropic.com" target="_blank">Anthropic Console</a>
    <a href="https://portal.azure.com" target="_blank">Azure Portal</a>
  </div>
</div>

<script>
const form = document.getElementById('form');
const status = document.getElementById('status');
const saveBtn = document.getElementById('save-btn');

function showStatus(message, isError) {
  status.textContent = message;
  status.className = 'status ' + (isError ? 'err' : 'ok');
}

async function load() {
  try {
    const res = await fetch('/api/config');
    if (!res.ok) throw new Error('GET /api/config ' + res.status);
    const cfg = await res.json();
    for (const [key, val] of Object.entries(cfg)) {
      const el = form.elements[key];
      if (!el) continue;
      if (el.type === 'checkbox') {
        el.checked = !!val;
      } else {
        el.value = val == null ? '' : String(val);
      }
    }
  } catch (e) {
    showStatus('설정 로드 실패: ' + e.message, true);
  }
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  saveBtn.disabled = true;
  saveBtn.textContent = '저장 중...';

  const data = {};
  for (const el of form.elements) {
    if (!el.name) continue;
    if (el.type === 'checkbox') {
      data[el.name] = el.checked;
    } else {
      const val = el.value.trim();
      // 빈 칸은 변경 안 함 (서버에서 무시)
      if (val) data[el.name] = val;
    }
  }

  try {
    const res = await fetch('/api/config', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data),
    });
    const body = await res.json();
    if (!res.ok) throw new Error(body.message || 'HTTP ' + res.status);
    showStatus(body.message + ' (' + (body.savedAt || '') + ')', false);
  } catch (e) {
    showStatus('저장 실패: ' + e.message, true);
  } finally {
    saveBtn.disabled = false;
    saveBtn.textContent = '저장';
  }
});

load();
</script>
</body>
</html>
