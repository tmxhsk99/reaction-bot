# 로컬 Ollama 2-스테이지 파이프라인 전용 설정.
# application.yml의 spring.config.import 로 합쳐짐.
#
# 동작:
#   1) vision-model 이 화면 캡처 → 한국어 1~2문장 묘사
#   2) text-model 이 (캐릭터 프롬프트 + 화면 묘사 + 유저 발화) → 반응 생성
#
# 단일 ollama provider와 다른 점:
#   - 캐릭터 프롬프트가 VL 호출엔 안 들어가 VL이 빠르고 가벼움
#   - 텍스트 모델은 이미지 토큰 없이 작은 컨텍스트만 받음 → 디코드 속도↑
#   - thinking 강제 VL 모델(qwen3-vl 등) 회피 가능 — text-model에서만 /no_think 처리
#
# base-url 은 환경변수 OLLAMA_BASE_URL 로 덮어쓸 수 있음.
reaction-bot:
  ollama-dual:
    base-url: ${OLLAMA_BASE_URL:http://192.168.0.8:11434}
    request-timeout-sec: 180              # 콜드 로드 포함 첫 호출 여유
    assertive: true                       # 텍스트 단계 적극성 nudge 자동 주입
    warmup-on-start: true                 # 기동 시 두 모델 모두 사전 로드

    vision-model:
      model: qwen2.5vl:7b                 # 이미지 → 한국어 묘사
      max-tokens: 200                     # 1~2문장이면 충분
      temperature: 0.3                    # 사실 묘사라 낮게
      num-ctx: 4096
      keep-alive: "1h"
      # 비전 단계 전용 지침. 묘사 자체가 한국어로 정확히 나오도록 강제.
      # qwen2.5vl이 한자/중국어로 묘사 빠지는 케이스 방지.
      extra-system-prompt: |
        [비전 출력 규칙 - 엄격]
        - 묘사는 한국어로만. 한자/병음/중국어/일본어/영문 문장 절대 금지.
          단, 화면에 표시된 고유명사(포켓몬·스킬·메뉴·아이템·캐릭터 이름)는
          화면 글자 그대로 인용. 임의 음역·번역·요약 금지.
        - 안 보이거나 확신 못 하는 텍스트는 추측해서 적지 말 것. 빼라.
        - 이모지/특수기호 금지.

    text-model:
      model: qwen2.5:7b                   # 묘사+발화 → 캐릭터 반응
      max-tokens: 80                      # 한국어 1~2문장(약 30자) 안에서 끝나도록 타이트하게
      temperature: 0.9                    # 다채로운 반응
      top_p: 0.95
      repeat-penalty: 1.3                 # "루기아 루기아" 류 토큰 루프 차단. Ollama 기본 1.1은 7B에 약함
      repeat-last-n: 128                  # 최근 128토큰 안에서 반복 검사 (기본 64는 발화 단위 반복 못 잡음)
      num-ctx: 4096
      keep-alive: "1h"
      think: false                        # /no_think 토큰 자동 주입 (thinking 모델 회피)
      # 텍스트(발화) 단계 전용 지침. 최종 음성으로 나가는 단계라 가장 엄격.
      extra-system-prompt: |
        [로컬 모델 출력 규칙 - 엄격]
        - 출력 형식: 발화 본문 한 줄만. 어떤 라벨/태그도 붙이지 마.
          [답변], [반응], [멘트], [봇], [출력], 답변:, 반응: 같은 prefix 절대 금지.
          따옴표·괄호·코드블록·markdown(**bold**, _italic_)으로 감싸지도 마.
          ❌ "[답변] 또 죽었어??"   ❌ "**답변**: 또 죽었어??"   ❌ "\"또 죽었어??\""
          ✅ 또 죽었어??
        - 길이: 1~2문장, 최대 30자 내외 권장. "왜냐하면 …", "그래서 …" 류 부연 설명 금지.
          긴 해설을 만들지 말고 바로 한마디만.
        - 출력 언어는 한국어로만. 한자/병음/중국어/일본어/영문 문장 절대 금지.
          영문은 게임 내 고유명사(스킬·아이템·캐릭터 이름)만 허용.
        - 이모지/이모티콘/특수기호(♥, ★, (>_<) 등) 절대 금지. TTS로 읽히므로 텍스트만.
        - 화면 텍스트 처리:
          * [현재 화면] 묘사에 들어 있는 고유명사는 글자 그대로 인용. 변형/번역 금지.
          * HP/MP·진영 상태·보스 등장 같은 "상황 해설·중계"는 금지. 반응만 해라.
        - 직전 1~3턴과 핵심 단어·구조가 겹치면 다른 각도로 변주. 같은 표현 재사용 금지.
          이전 화면·발화 대비 달라진 부분에만 반응.
