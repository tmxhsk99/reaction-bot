# 로컬 Ollama 2-스테이지 파이프라인 전용 설정.
# application.yml의 spring.config.import 로 합쳐짐.
#
# 동작:
#   1) vision-model 이 화면 캡처 → 한국어 1~2문장 묘사
#   2) text-model 이 (캐릭터 프롬프트 + 화면 묘사 + 유저 발화) → 반응 생성
#
# 단일 ollama provider와 다른 점:
#   - 캐릭터 프롬프트가 VL 호출엔 안 들어가 VL이 빠르고 가벼움
#   - 텍스트 모델은 이미지 토큰 없이 작은 컨텍스트만 받음 → 디코드 속도↑
#   - thinking 강제 VL 모델(qwen3-vl 등) 회피 가능 — text-model에서만 /no_think 처리
#
# base-url 은 환경변수 OLLAMA_BASE_URL 로 덮어쓸 수 있음.
reaction-bot:
  ollama-dual:
    base-url: ${OLLAMA_BASE_URL:http://192.168.0.8:11434}
    request-timeout-sec: 180              # 콜드 로드 포함 첫 호출 여유
    assertive: true                       # 텍스트 단계 적극성 nudge 자동 주입
    warmup-on-start: true                 # 기동 시 두 모델 모두 사전 로드

    vision-model:
      model: qwen2.5vl:7b                 # 이미지 → 한국어 묘사
      max-tokens: 200                     # 1~2문장이면 충분
      temperature: 0.3                    # 사실 묘사라 낮게
      num-ctx: 4096
      keep-alive: "1h"

    text-model:
      model: qwen2.5:7b                   # 묘사+발화 → 캐릭터 반응
      max-tokens: 200
      temperature: 0.9                    # 다채로운 반응
      top_p: 0.95
      num-ctx: 4096
      keep-alive: "1h"
      think: false                        # /no_think 토큰 자동 주입 (thinking 모델 회피)
